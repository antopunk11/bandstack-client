<div class="max-w-2xl mx-auto p-4 sm:p-6 bg-zinc-950 min-h-screen pb-24 text-zinc-100">
  <h2 class="text-2xl font-bold text-white mb-6">Nuevo Producto</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <!-- DATOS DEL PRODUCTO -->
    <div class="bg-zinc-900 p-5 rounded-xl shadow-sm border border-zinc-800 space-y-4">
      <h3 class="text-lg font-semibold text-white border-b border-zinc-800 pb-2">Datos Básicos</h3>
      
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Nombre del Producto *</label>
        <input type="text" formControlName="name" placeholder="Ej: Camiseta Tour 2025"
          class="w-full p-3 bg-zinc-950 text-white border border-zinc-800 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all placeholder-zinc-700">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-1">Categoría *</label>
          <select formControlName="category_id"
            class="w-full p-3 bg-zinc-950 text-white border border-zinc-800 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-1">Precio Venta (€) *</label>
          <input type="number" step="0.50" formControlName="base_price"
            class="w-full p-3 bg-zinc-950 text-white border border-zinc-800 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Descripción</label>
        <textarea formControlName="description" rows="2"
          class="w-full p-3 bg-zinc-950 text-white border border-zinc-800 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition-all"></textarea>
      </div>
    </div>

    <!-- VARIANTES (TALLAS/FORMATOS) -->
    <div class="bg-zinc-900 p-5 rounded-xl shadow-sm border border-zinc-800 space-y-4">
      <div class="flex items-center justify-between border-b border-zinc-800 pb-2">
        <h3 class="text-lg font-semibold text-white">Variantes / Tallas</h3>
        <button type="button" (click)="addVariant()" 
          class="text-sm bg-zinc-800 text-orange-500 px-3 py-1.5 rounded-md font-medium hover:bg-zinc-700 active:scale-95 transition-all">
          + Añadir Variante
        </button>
      </div>

      <div formArrayName="variants" class="space-y-4">
        <div *ngFor="let variant of variants.controls; let i=index" [formGroupName]="i" 
          class="p-4 border border-zinc-800 bg-zinc-950 rounded-lg relative">
          
          <!-- Botón eliminar variante -->
          <button *ngIf="variants.length > 1" type="button" (click)="removeVariant(i)"
            class="absolute top-2 right-2 text-red-500 p-2 rounded-full hover:bg-red-900/30 active:bg-red-900/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-2">
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase mb-1">Talla / Formato *</label>
              <input type="text" formControlName="attribute" placeholder="Ej: L, XL, Vinilo"
                class="w-full p-2.5 bg-zinc-900 text-white border border-zinc-700 rounded-md focus:ring-2 focus:ring-orange-500 outline-none placeholder-zinc-600">
            </div>
            
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase mb-1">Precio Específico (€)</label>
              <input type="number" step="0.50" formControlName="price_override" placeholder="Opcional"
                class="w-full p-2.5 bg-zinc-900 text-white border border-zinc-700 rounded-md focus:ring-2 focus:ring-orange-500 outline-none placeholder-zinc-600">
              <p class="text-[10px] text-zinc-500 mt-1">Déjalo vacío para usar el Precio de Venta base.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTÓN GUARDAR (Fijo abajo en móviles) -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-zinc-900 border-t border-zinc-800 sm:relative sm:bg-transparent sm:border-0 sm:p-0 z-10">
      <button type="submit" [disabled]="productForm.invalid || isSubmitting"
        class="w-full bg-orange-600 text-white font-semibold p-4 rounded-xl hover:bg-orange-500 active:scale-[0.98] transition-all flex justify-center items-center disabled:opacity-50 disabled:bg-zinc-800 disabled:text-zinc-500 shadow-lg shadow-orange-900/20 sm:shadow-none">
        
        <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        
        {{ isSubmitting ? 'Guardando...' : 'Guardar Producto' }}
      </button>
    </div>

  </form>

  <!-- TOAST NOTIFICATION -->
  <div *ngIf="toastMessage" 
       class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-orange-600 text-white px-4 py-3 rounded-xl shadow-2xl shadow-orange-900/20 z-50 text-sm font-medium flex items-center gap-3 transition-all duration-300">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {{ toastMessage }}
  </div>
</div>
