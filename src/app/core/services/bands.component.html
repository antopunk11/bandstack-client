<div class="max-w-5xl mx-auto p-4 sm:p-6 bg-zinc-950 min-h-screen text-zinc-100 pb-24">

  <!-- TOAST NOTIFICATION -->
  <div *ngIf="toastMessage" class="fixed top-4 right-4 bg-emerald-500 text-white px-6 py-3 rounded-xl shadow-lg font-medium animate-fade-in-down z-50 flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
    {{ toastMessage }}
  </div>

  <!-- HEADER -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
    <div>
      <div class="flex items-center gap-3">
        <h2 class="text-3xl font-black text-white">Plataforma SaaS</h2>
        <span class="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-3 py-1 text-xs font-bold rounded-full">SuperAdmin</span>
      </div>
      <p class="text-zinc-500 mt-1">Gestiona los grupos y suscripciones del sistema</p>
    </div>
    <button (click)="openCreateForm()" class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-2.5 px-5 rounded-xl transition-all shadow-lg shadow-purple-900/20 flex items-center gap-2 active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
      Nueva Banda
    </button>
  </div>

  <!-- ESTADO DE CARGA -->
  <div *ngIf="isLoading" class="flex justify-center py-12">
    <svg class="animate-spin h-10 w-10 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
  </div>

  <!-- TABLA DE BANDAS -->
  <div *ngIf="!isLoading && !showForm" class="bg-zinc-900 border border-zinc-800 rounded-2xl shadow-xl overflow-hidden animate-fade-in-up">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-zinc-950 text-zinc-400 text-sm uppercase tracking-wider">
            <th class="p-5 font-semibold w-16 text-center">ID</th>
            <th class="p-5 font-semibold">Nombre de la Banda</th>
            <th class="p-5 font-semibold text-center">Registrada</th>
            <th class="p-5 font-semibold text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-800/50">
          <tr *ngFor="let band of bands" class="hover:bg-zinc-800/30 transition-colors">
            <td class="p-5 text-center text-zinc-500 font-mono text-sm">#{{ band.id }}</td>
            <td class="p-5 font-bold text-zinc-100 text-lg">{{ band.name }}</td>
            <td class="p-5 text-center text-sm text-zinc-400">{{ band.created_at | date:'mediumDate' }}</td>
            <td class="p-5 text-right space-x-2">
              <button (click)="openEditForm(band)" class="p-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
              </button>
              <button *ngIf="band.id !== 1" (click)="deleteBand(band)" class="p-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="bands.length === 0">
            <td colspan="4" class="p-8 text-center text-zinc-500">No hay bandas registradas.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- FORMULARIO CREAR / EDITAR -->
  <div *ngIf="showForm" class="bg-zinc-900 border border-zinc-800 rounded-2xl shadow-xl p-6 sm:p-8 max-w-lg mx-auto animate-fade-in-up">
    <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
      <h3 class="text-xl font-bold text-white">{{ isEditing ? 'Editar Banda' : 'Nueva Banda' }}</h3>
      <button (click)="closeForm()" class="text-zinc-500 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <form [formGroup]="bandForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Nombre de la Banda</label>
        <input type="text" formControlName="name" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors" placeholder="Ej. The Rolling Stones">
      </div>

      <div class="pt-4 flex gap-3">
        <button type="button" (click)="closeForm()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 text-white font-semibold rounded-xl transition-colors">Cancelar</button>
        <button type="submit" [disabled]="bandForm.invalid || isSubmitting" class="flex-1 py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-purple-900/20 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center">
          <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          {{ isSubmitting ? 'Guardando...' : 'Guardar Banda' }}
        </button>
      </div>
    </form>
  </div>
</div>
